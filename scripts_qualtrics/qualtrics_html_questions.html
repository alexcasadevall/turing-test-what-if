<link rel="stylesheet" href="https://alexcasadevall.github.io/turing-test-what-if/estils.css">

<div id="session-wrapper" style="max-height: 650px; overflow-y: auto; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
    
    <div class="header" style="position: sticky; top: 0; z-index: 10;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="background: #f1f5f9; padding: 8px; border-radius: 8px; display: flex;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
            <div>
                <div style="font-weight: 600; font-size: 14px; color: #1e293b;">Discussion Room</div>
                <div id="p-count" style="font-size: 12px; color: #64748b;">Carregant participants...</div>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 6px; font-size: 12px; color: #64748b;">
            <span style="height: 8px; width: 8px; background: #22c55e; border-radius: 50%;"></span> En línia
        </div>
    </div>

    <div id="messages-container" style="padding: 15px;">
        <div class="date-pill" style="margin-bottom: 20px;"><span>Avui</span></div>
        
        <div class="news-card">
            <div id="news-agency" style="font-size: 11px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; font-weight: 600;">SISTEMA</div>
            <div id="news-title" class="news-title" style="font-weight: 700; font-size: 1.1em; margin-bottom: 8px;"></div>
            <div id="news-body" class="news-body" style="font-size: 0.95em; color: #334155;"></div>
            <div id="news-time" style="text-align: right; font-size: 11px; color: #94a3b8; margin-top: 10px;"></div>
        </div>

        <div id="reddit-messages">
            <div style="text-align: center; padding: 40px; color: #64748b;">Carregant la conversa...</div>
        </div>
    </div>
</div>
